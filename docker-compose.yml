services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clawdeck
      POSTGRES_PASSWORD: clawdeck
      POSTGRES_DB: clawdeck_production
    volumes:
      - clawdeck_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawdeck -d clawdeck_production"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      DATABASE_URL: "postgres://clawdeck:clawdeck@db:5432/clawdeck_production"
      RAILS_MASTER_KEY: "${RAILS_MASTER_KEY}"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      PORT: "3000"

volumes:
  clawdeck_db:
